name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: mvpuser
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: mvpdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mvpuser -d mvpdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check src/ || true
      - name: Type check (mypy)
        run: mypy src/ || true
      - name: Run tests
        run: pytest -q
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: mvp-app
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-${{ github.run_number }} .
          echo "Built image"
