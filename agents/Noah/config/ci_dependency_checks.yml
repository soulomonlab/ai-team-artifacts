name: CI Dependency Checks
on:
  pull_request:
    branches: [ main ]

jobs:
  dependency_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ruff for linting
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check src/

      - name: Snyk auth
        if: secrets.SNYK_TOKEN
        run: |
          echo "$SNYK_TOKEN" | snyk auth
      - name: Snyk test (vuln scan)
        if: secrets.SNYK_TOKEN
        run: snyk test --all-projects --severity-threshold=high

      - name: Dependabot alerts check
        uses: some-org/dependabot-check-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: ORT (OSS Review Toolkit) scan for IaC
        run: |
          curl -sL https://raw.githubusercontent.com/oss-review-toolkit/ort/master/installer/install.sh | bash
          ort --help
          # The ORT scan requires configuration per repo; see output/docs/iac_audit_runbook.md

      - name: Fail the build on new critical/high CVEs
        run: |
          echo "Checking Snyk JSON output for critical/high..."
          # Placeholder: CI will check Snyk output file and exit non-zero if new critical/high are found
          exit 0
