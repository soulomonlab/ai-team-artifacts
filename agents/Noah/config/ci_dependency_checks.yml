name: CI Dependency & IaC Security Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  dependency-check:
    name: Dependency & Container Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node (for Snyk)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Snyk CLI
        run: |
          npm install -g snyk@latest
      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN || true
      - name: Run Snyk test (fail on high+critical)
        run: |
          snyk test --severity-threshold=high || exit 1

  iac-scan:
    name: Infrastructure as Code Scan (ORT / tfsec / checkov)
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - uses: actions/checkout@v4
      - name: Install ORT (OSS Review Toolkit) deps
        run: |
          sudo apt-get update && sudo apt-get install -y openjdk-11-jre-headless python3-pip
      - name: Run tfsec for Terraform static checks
        run: |
          pip install tfsec
          tfsec . || true
      - name: Run Checkov for policy checks
        run: |
          pip install checkov
          checkov -d . --quiet || true
      - name: Run ORT scan (detect new license/vulnerability findings)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Requires a pre-built ORT distribution or docker image in runner environment.
          # This step will run ORT's analyzer and scanner to produce a report in ORT-output.
          mkdir -p ort-output
          echo "ORT run placeholder - run ORT in CI runner or in self-hosted runner with ORT installed" > ort-output/README.txt
          # Exit code handling: ORT should be configured to fail the job when new CRITICAL/HIGH findings are detected.
          echo "If ORT finds new high/critical vulnerabilities, fail the pipeline."

  provider-plugin-check:
    name: Terraform provider & IaC plugin checks
    runs-on: ubuntu-latest
    needs: iac-scan
    steps:
      - uses: actions/checkout@v4
      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash || true
      - name: Run tflint
        run: |
          tflint --init || true
          tflint || true
      - name: Report summary
        run: |
          echo "If provider/plugin CVEs are detected, create issue with label 'devops' and include remediation ETA. Baseline allows existing moderate issues; new high/critical must block."