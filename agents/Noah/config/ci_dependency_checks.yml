name: CI Dependency & IaC Checks
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dependency-check:
    name: Dependency & IaC gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (for ORT)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Snyk CLI
        run: |
          curl -sL https://snyk.io/install | bash
          export PATH=$HOME/.snyk/bin:$PATH

      - name: Restore dependency baseline
        run: |
          if [ -f .github/dependency_baseline.json ]; then
            echo "Baseline found"
          else
            echo '{}' > .github/dependency_baseline.json
          fi

      - name: Run Snyk test (code + IaC)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -e
          snyk test --json > snyk_raw.json || true
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('snyk_raw.json')); const high=r.vulnerabilities && r.vulnerabilities.filter(v=>v.severity==='high' || v.severity==='critical'); if(high.length>0){console.log('High/Critical vuln(s) detected'); process.exit(2);} else {console.log('No new high/critical vuln found');}"

      - name: Run ORT Analyzer for IaC (audit provider plugins)
        env:
          ORT_CONFIG: ${{ secrets.ORT_CONFIG }}
        run: |
          set -e
          mkdir -p ort-output
          # Download ORT (short self-contained wrapper)
          curl -sL https://github.com/oss-review-toolkit/ort/releases/download/2024.02.00/ort-2024.02.00-all.jar -o ort.jar || true
          java -jar ort.jar --info --analyze --input-dir . --output ort-output/scan-output.yml || true
          echo "ORT analysis output in ort-output/scan-output.yml"

      - name: Archive results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: |
            snyk_raw.json
            ort-output/scan-output.yml

  enforce-baseline:
    name: Enforce dependency baseline
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on new high/critical vulnerabilities
        run: |
          echo "Dependency checks completed in previous job. If new high/critical vulnerabilities were found the job would have failed."
          # The actual enforcement is handled by dependency-check step returning non-zero on high/critical.

  notify:
    runs-on: ubuntu-latest
    needs: [dependency-check, enforce-baseline]
    steps:
      - name: Post summary
        run: echo "Dependency gate completed. Artifacts available. See Actions run for details." 
