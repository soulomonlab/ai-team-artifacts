version: '3.8'
services:
  core-api:
    build: .
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    env_file:
      - .env.dev
    depends_on:
      - db
      - redis
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
