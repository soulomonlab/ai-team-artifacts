openapi: 3.0.3
info:
  title: Auth API
  version: "1.0.0"
servers:
  - url: https://api.example.com/v1
paths:
  /v1/auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: Token response and refresh_token cookie is set (HttpOnly)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      x-cookie-set:
        name: refresh_token
        httpOnly: true
        secure: true
        sameSite: Lax
        path: /
        domain: .example.com
        ttl_days: 30
  /v1/auth/refresh:
    post:
      summary: Rotate refresh token and return new access token
      responses:
        '200':
          description: New access token JSON; refresh_token cookie rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      security: []
  /v1/auth/logout:
    post:
      summary: Logout — clears refresh token and invalidates server-side token
      responses:
        '204':
          description: Logged out, cookie cleared
  /v1/auth/signup:
    post:
      summary: Create user and login (sets refresh cookie)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        '201':
          description: Created + Token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /v1/users/me:
    get:
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, email, roles, created_at, updated_at]
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
      required: [access_token, token_type, expires_in]
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
x-cookie-policy:
  name: refresh_token
  domain: .example.com
  path: /
  httpOnly: true
  secure: true
  sameSite: Lax
  ttl_days: 30
x-cors:
  allowed_origins:
    - https://app.example.com
    - https://staging.example.com
  allow_credentials: true
  enforce_origin_check: true
x-error-format: |
  RFC7807 + {"code": "string", "field_errors": [{"field":"string","message":"string"}]}